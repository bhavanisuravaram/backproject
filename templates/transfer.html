{% extends "layout.html" %}
{% block content %}

<div class="form-container">
    <h2 class="mb-4">
        <i class="bi bi-send me-2"></i>Send Money
    </h2>

    <form method="post" class="needs-validation" novalidate>

        <div class="mb-3">
            <label for="recipient_email" class="form-label">Recipient Email Address</label>
            <input
                type="email"
                class="form-control"
                id="recipient_email"
                name="recipient_email"
                placeholder="recipient@example.com"
                required
            >
            <div class="invalid-feedback">
                Please enter a valid recipient email.
            </div>
        </div>

        <div class="mb-3">
            <label for="amount" class="form-label">Transfer Amount ($)</label>
            <input
                type="number"
                class="form-control"
                id="amount"
                name="amount"
                step="0.01"
                min="0.01"
                placeholder="0.00"
                required
            >
            <div class="invalid-feedback">
                Amount must be at least $0.01.
            </div>
        </div>

        <div class="mb-3">
            <label for="mobile_number" class="form-label">
                Mobile Number <span class="text-muted">(Optional)</span>
            </label>
            <input
                type="tel"
                class="form-control"
                id="mobile_number"
                name="mobile_number"
                placeholder="+1 123 456 7890"
            >
            <div class="form-text">
                Used only for transfer verification if required.
            </div>
        </div>

        <div class="mb-3">
            <label for="note" class="form-label">Message / Note</label>
            <input
                type="text"
                class="form-control"
                id="note"
                name="note"
                placeholder="Optional message for the recipient"
            >
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-info">
                <i class="bi bi-arrow-right-circle me-1"></i>Transfer Funds
            </button>

            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
                Cancel
            </a>
        </div>

    </form>
</div>

<script>
(function () {
    'use strict';
    window.addEventListener('load', function () {
        const forms = document.getElementsByClassName('needs-validation');
        Array.prototype.forEach.call(forms, function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    }, false);
})();
</script>

{% endblock %}
